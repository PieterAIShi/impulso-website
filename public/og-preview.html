<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #09090b;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 80px;
      overflow: hidden;
    }

    /* Subtle gradient orb top-right */
    .glow {
      position: absolute;
      top: -120px;
      right: -80px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      filter: blur(60px);
    }

    /* Subtle gradient orb bottom-left */
    .glow2 {
      position: absolute;
      bottom: -150px;
      left: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      filter: blur(80px);
    }

    /* Grid pattern overlay */
    .grid-pattern {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .content {
      position: relative;
      z-index: 10;
      flex: 1;
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 32px;
    }

    .logo span {
      color: #6366f1;
    }

    h1 {
      font-size: 56px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 20px;
    }

    h1 em {
      font-style: normal;
      color: #6366f1;
    }

    .subtitle {
      font-size: 22px;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      max-width: 600px;
      margin-bottom: 36px;
    }

    .tags {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 8px 18px;
      border-radius: 10px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      font-weight: 500;
    }

    /* Right side visual */
    .visual {
      position: relative;
      z-index: 10;
      width: 340px;
      flex-shrink: 0;
      margin-left: 60px;
    }

    .agent-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .agent-dot {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .agent-card .name {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      font-weight: 600;
    }

    .agent-card .desc {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      margin-top: 2px;
    }

    .agent-card .status {
      margin-left: auto;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    /* Bottom bar */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(255,255,255,0.02);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 80px;
      z-index: 10;
    }

    .bottom-bar .url {
      color: rgba(255,255,255,0.3);
      font-size: 15px;
      font-weight: 500;
    }

    .bottom-bar .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
    }

    .bottom-bar .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="glow2"></div>
    <div class="grid-pattern"></div>

    <div class="content">
      <div class="logo">Virelio<span>.</span></div>
      <h1>Wij bouwen jouw<br><em>digitale team</em></h1>
      <p class="subtitle">AI agents die samenwerken, delegeren en uitvoeren — live in 2 weken.</p>
      <div class="tags">
        <div class="tag">Klantenservice</div>
        <div class="tag">Sales</div>
        <div class="tag">Operations</div>
        <div class="tag">Kennisbank</div>
      </div>
    </div>

    <div class="visual">
      <div class="agent-card">
        <div class="agent-dot" style="background: rgba(99,102,241,0.2);">🧠</div>
        <div>
          <div class="name">Nova</div>
          <div class="desc">Orchestrator</div>
        </div>
        <div class="status"></div>
      </div>
      <div class="agent-card">
        <div class="agent-dot" style="background: rgba(59,130,246,0.15);">🔍</div>
        <div>
          <div class="name">Scout</div>
          <div class="desc">Research</div>
        </div>
        <div class="status"></div>
      </div>
      <div class="agent-card">
        <div class="agent-dot" style="background: rgba(139,92,246,0.15);">📊</div>
        <div>
          <div class="name">Pixel</div>
          <div class="desc">Analytics</div>
        </div>
        <div class="status"></div>
      </div>
      <div class="agent-card">
        <div class="agent-dot" style="background: rgba(245,158,11,0.15);">🔧</div>
        <div>
          <div class="name">Forge</div>
          <div class="desc">Builder</div>
        </div>
        <div class="status"></div>
      </div>
      <div class="agent-card">
        <div class="agent-dot" style="background: rgba(16,185,129,0.15);">📡</div>
        <div>
          <div class="name">Pulse</div>
          <div class="desc">Monitor</div>
        </div>
        <div class="status"></div>
      </div>
    </div>

    <div class="bottom-bar">
      <span class="url">virelio.nl</span>
      <div class="badge">
        <div class="dot"></div>
        Amsterdam, NL · 18+ bedrijven
      </div>
    </div>
  </div>
</body>
</html>
